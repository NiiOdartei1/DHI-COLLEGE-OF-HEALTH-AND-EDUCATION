services:
  - type: web
    name: dhi-lms
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_DISK_PATH
        value: /opt/render/project/uploads
    disk:
      name: uploads
      mountPath: /opt/render/project/uploads
      sizeGB: 10

databases:
  - name: dhi-lms-db
    databaseName: dhi_lms
    user: dhi_lms_user
